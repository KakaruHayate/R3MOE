name: Build and Release Windows EXE

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scipy matplotlib pyyaml librosa soundfile tkinterdnd2 pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile `
          --name "MouthBakerUI" `
          --collect-data tkinterdnd2 `
          --hidden-import librosa `
          --hidden-import soundfile `
          --hidden-import yaml `
          mouth_baker_ui.py

    # --- 新增步骤：将 EXE 和 experiments 文件夹一起打包成 ZIP ---
    - name: Package into ZIP
      run: |
        Compress-Archive -Path dist\MouthBakerUI.exe, experiments -DestinationPath dist\MouthBakerUI-Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MouthBakerUI-Windows
        # 修改上传路径为 zip
        path: dist/MouthBakerUI-Windows.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        # 发布内容改为 zip
        files: dist/MouthBakerUI-Windows.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}