name: Build and Release macOS App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch
        pip install numpy scipy matplotlib pyyaml librosa soundfile tkinterdnd2 pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile \
          --name "MouthBakerUI" \
          --collect-data tkinterdnd2 \
          --hidden-import librosa \
          --hidden-import soundfile \
          --hidden-import yaml \
          mouth_baker_ui.py

    # --- 修改步骤：将可执行文件和 experiments 文件夹一起打包 ---
    - name: Zip the Executable and Models
      run: |
        # 将 experiments 文件夹拷贝到 dist 目录中，保持层级关系
        cp -r experiments dist/
        cd dist
        zip -r MouthBakerUI-macOS.zip MouthBakerUI experiments/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MouthBakerUI-macOS
        path: dist/MouthBakerUI-macOS.zip

    - name: Add to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/MouthBakerUI-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}