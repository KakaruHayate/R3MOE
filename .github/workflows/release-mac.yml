name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest # 默认使用 Apple Silicon (M1/M2) 架构

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # macOS 默认的 PyTorch wheel 就是 CPU/MPS 版本，体积已经优化过
        pip install torch
        # 安装其他运行依赖与打包工具
        pip install numpy scipy matplotlib pyyaml librosa soundfile tkinterdnd2 pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        # 注意：macOS 下使用 \ 来换行
        # 我们这里不使用 --windowed，直接输出单文件可执行程序，这样路径结构与 Windows 保持一致
        pyinstaller --onefile \
          --name "MouthBakerUI" \
          --collect-data tkinterdnd2 \
          --hidden-import librosa \
          --hidden-import soundfile \
          --hidden-import yaml \
          mouth_baker_ui.py

    - name: Zip the Executable (Preserves Execution Permissions)
      run: |
        cd dist
        # 将编译出的 Unix 可执行文件打包成 zip
        zip MouthBakerUI-macOS.zip MouthBakerUI

    - name: Upload Artifact (For Manual Download)
      uses: actions/upload-artifact@v4
      with:
        name: MouthBakerUI-macOS
        path: dist/MouthBakerUI-macOS.zip

    - name: Add to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/MouthBakerUI-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}